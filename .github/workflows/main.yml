name: Lineage 15.1 TAQ90
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 720
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost /opt/hostedtoolcache/CodeQL \
            /usr/local/.ghcup /usr/share/swift
          sudo docker image prune -af || true
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git gnupg gperf \
            imagemagick lib32ncurses5-dev lib32readline-dev \
            lib32z1-dev liblz4-tool libncurses5-dev \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils \
            lzop pngcrush rsync schedtool squashfs-tools \
            xsltproc zip zlib1g-dev openjdk-8-jdk

      - name: Fix libncurses for Android 8.1 Clang
        run: |
          sudo apt-get install -y libncurses5 libtinfo5 2>/dev/null || {
            echo "Package not in repo. Creating safe symlinks..."
            sudo ln -sf /usr/lib/x86_64-linux-gnu/libncurses.so.6 /usr/lib/x86_64-linux-gnu/libncurses.so.5
            sudo ln -sf /usr/lib/x86_64-linux-gnu/libtinfo.so.6 /usr/lib/x86_64-linux-gnu/libtinfo.so.5
          }
          echo "✅ libncurses.so.5 dependency resolved"

      - name: Fix Python 2 Requirement for Android 8.1
        run: |
          # Android 8.1 build scripts strictly require Python 2.7
          sudo apt-get install -y python2 2>/dev/null || {
            sudo add-apt-repository ppa:deadsnakes/ppa -y
            sudo apt-get update
            sudo apt-get install -y python2.7
          }
          sudo ln -sf /usr/bin/python2.7 /usr/bin/python
          python --version
          echo "✅ Python 2.7 set as default"

      - name: Use Java 8
        run: |
          sudo update-alternatives --set java /usr/lib/jvm/java-8-openjdk-amd64/jre/bin/java
          sudo update-alternatives --set javac /usr/lib/jvm/java-8-openjdk-amd64/bin/javac
          echo "JAVA_HOME=/usr/lib/jvm/java-8-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-8-openjdk-amd64/bin" >> $GITHUB_PATH
          java -version
          javac -version

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          # Use runner.os so the key is the same every time (e.g., ccache-taq90-Linux)
          key: ccache-taq90-${{ runner.os }}
          restore-keys: |
            ccache-taq90-${{ runner.os }}

      - name: Init repo
        run: |
          mkdir -p ~/android/lineage
          cd ~/android/lineage
          git config --global user.email "build@ci.local"
          git config --global user.name "CI Build"
          repo init -u https://github.com/LineageOS/android.git -b lineage-15.1 --depth=1

      - name: Sync source
        run: |
          cd ~/android/lineage
          repo sync -c --no-tags --no-clone-bundle --optimized-fetch \
            --prune --force-sync -j$(nproc)

      - name: Clone device tree
        run: |
          cd ~/android/lineage
          git clone --depth=1 https://github.com/Tommy0412/device_denver_TAQ90.git device_tmp
          rm -rf device/denver/TAQ90
          mkdir -p device/denver
          cp -r device_tmp/device/denver/TAQ90 device/denver/TAQ90
          rm -rf device_tmp

      - name: Clone vendor tree
        run: |
          cd ~/android/lineage
          git clone --depth=1 https://github.com/Tommy0412/vendor_denver_TAQ90.git vendor_tmp
          rm -rf vendor/denver/TAQ90
          mkdir -p vendor/denver
          cp -r vendor_tmp/vendor/denver/TAQ90 vendor/denver/TAQ90
          rm -rf vendor_tmp

      - name: Surgical Fix for vendor/lineage ckati Crash
        run: |
          cd ~/android/lineage
          
          echo "=== 1. Enforcing Unix line endings at repo level ==="
          git config --global core.autocrlf false
          git config --global core.eol lf
          
          echo "=== 2. Overwriting the exact crashing file ==="
          # Create a known-safe version with guaranteed newline
          mkdir -p vendor/lineage/prebuilt/common
          printf '# Include all prebuilt makefiles\ninclude $(call all-makefiles-under,$(LOCAL_PATH))\n' > vendor/lineage/prebuilt/common/Android.mk
          
          echo "=== 3. Sanitize bootanimation & charger makefiles ==="
          for f in vendor/lineage/bootanimation/Android.mk vendor/lineage/charger/Android.mk; do
            if [ -f "$f" ]; then
              sed -i 's/[[:space:]]*$//' "$f"
              sed -i 's/\r$//' "$f"
              echo "" >> "$f"
            fi
          done
          
          echo "=== 4. Verify exact bytes (cat -A shows hidden chars) ==="
          cat -A vendor/lineage/prebuilt/common/Android.mk
          for f in vendor/lineage/prebuilt/common/Android.mk vendor/lineage/bootanimation/Android.mk vendor/lineage/charger/Android.mk; do
            if [ -n "$(tail -c 1 "$f")" ]; then echo "⚠️ MISSING NEWLINE: $f"; else echo "✅ OK: $f"; fi
          done
          
          echo "=== 5. Quick ckati dry-run ==="
          source build/envsetup.sh &> /dev/null
          lunch lineage_TAQ90-userdebug &> /dev/null
          make -n recoveryimage 2>&1 | grep -iE "error|warning|commands commence" || echo "✅ Parse validation passed!"

      - name: Fix ckati Parser & Remove Broken Vendor Trees
        run: |
          cd ~/android/lineage
          TARGET_DIR="vendor/denver/TAQ90/proprietary/vendor"

          echo "=== 1. Cleaning vendor directory windows bloat ==="
          if [ -d "$TARGET_DIR" ]; then
            # Clean metadata safely using explicit name flags
            find "$TARGET_DIR" -name ".*" -delete 2>/dev/null || true
            find "$TARGET_DIR" -name "Thumbs.db" -delete 2>/dev/null || true
            find "$TARGET_DIR" -name "desktop.ini" -delete 2>/dev/null || true
            
            # Appended || true so grep doesn't crash the runner when zero bad files are found
            find "$TARGET_DIR" -type f 2>/dev/null | grep -E ' |:' | while read -r broken_file; do
              echo "Removing malformed path: $broken_file"
              rm -f "$broken_file"
            done || true

            # Clean broken symlinks safely
            find "$TARGET_DIR" -type l 2>/dev/null | while read -r symlink; do
              if [ ! -e "$symlink" ]; then
                echo "Removing broken symlink: $symlink"
                rm -f "$symlink"
              fi
            done || true
          fi

          echo "=== 2. Removing unnecessary vendor trees ==="
          rm -rf vendor/qcom vendor/codeaurora vendor/nxp || true

          echo "=== 3. Sanitizing all makefiles ==="
          find device/denver vendor/denver -type f -name "*.mk" 2>/dev/null | while read -r mk_file; do
            sed -i 's/\r$//' "$mk_file"
            sed -i 's/^[[:space:]]*\t//g' "$mk_file"
            # Ensure proper trailing newline ending
            [ -n "$(tail -c 1 "$mk_file")" ] && echo >> "$mk_file" || true
          done || true

          echo "=== 4. Verifying environment ==="
          if [ -d "vendor/qcom" ] || [ -d "vendor/codeaurora" ]; then
            echo "⚠️ Qualcomm trees still exist!"
          else
            echo "✅ Environment sanitized successfully."
          fi

      - name: Debug Makefile Syntax Errors
        run: |
          cd ~/android/lineage
          echo "=== EXACT LINE 34 of build/core/Makefile ==="
          sed -n '34p' build/core/Makefile | cat -A | head -n 1
          echo "=== Lines 32-36 for context ==="
          sed -n '32,36p' build/core/Makefile | cat -A
          
          echo "=========================================="
          echo "2. Searching for hidden TABS in device/vendor trees"
          echo "=========================================="
          grep -rnP '^\t' --include="*.mk" device/denver/ vendor/denver/ || echo "No leading tabs found."
          
          echo "=========================================="
          echo "3. Checking the last included file (rcs-service)"
          echo "=========================================="
          cat -A vendor/qcom/opensource/rcs-service/Android.mk | head -n 15 || echo "File not found."
          
          echo "=========================================="
          echo "4. Checking for missing 'endif' in device tree"
          echo "=========================================="
          for f in device/denver/TAQ90/*.mk; do
            if [ -f "$f" ]; then
              if_count=$(grep -c -E 'ifeq|ifneq' "$f" || true)
              endif_count=$(grep -c 'endif' "$f" || true)
              echo "$f -> ifeq/ifneq: $if_count | endif: $endif_count"
            fi
          done

      - name: Harden Build Environment for Lineage 15.1 CI
        run: |
          cd ~/android/lineage
          
          # 1. Fix Jack Server OOM crashes (GitHub runners have ~7GB RAM)
          export JACK_SERVER_VM_ARGUMENTS="-Xmx4096m -Dfile.encoding=UTF-8"
          export ANDROID_JACK_VM_ARGS="-Xmx4096m"
          echo "✅ Jack server memory limited to 4GB"
          
          # 2. Force Python 2 for ALL build scripts
          export BUILD_PYTHON_VERSION=2
          export PYTHON=python2
          sudo ln -sf /usr/bin/python2.7 /usr/bin/python
          echo "✅ Python 2 forced globally"
          
          # 3. Optimize ccache for CI disk limits (prevents runner OOM)
          export USE_CCACHE=1
          export CCACHE_EXEC=/usr/bin/ccache
          ccache -M 3G  # GitHub free tier runs out of disk >5GB ccache
          echo "✅ ccache capped at 3GB"
          
          # 4. Pre-create output dirs to avoid permission races
          mkdir -p out/target/product/TAQ90/obj
          echo "✅ Output directories initialized"
          
          # 5. Rockchip mkbootimg fallback (prevents packaging crashes)
          if ! grep -q "BOARD_MKBOOTIMG_ARGS" device/denver/TAQ90/BoardConfig.mk; then
            echo "BOARD_MKBOOTIMG_ARGS += --base 0x60000000 --pagesize 2048 --ramdisk_offset 0x62000000 --tags_offset 0x60000100" >> device/denver/TAQ90/BoardConfig.mk
            echo "✅ Safe mkbootimg args added"
          fi

      - name: Fix Ninja NOTICE.xml Dependency Cycle (Guaranteed)
        run: |
          cd ~/android/lineage
          echo "=== Aggressively patching build/core/Makefile ==="
          python3 << 'EOF'
          with open('build/core/Makefile', 'r') as f:
              lines = f.readlines()
          
          with open('build/core/Makefile', 'w') as f:
              for line in lines:
                  # Comment out ANY line containing NOTICE.xml that isn't already a comment
                  if 'NOTICE.xml' in line and not line.strip().startswith('#'):
                      f.write('# DISABLED NOTICE CYCLE: ' + line)
                  else:
                      f.write(line)
          print("✅ All NOTICE.xml generation rules disabled")
          EOF
          
          echo "=== Creating dummy NOTICE files to satisfy existence checks ==="
          mkdir -p out/target/product/TAQ90/system/etc
          mkdir -p out/target/product/TAQ90/obj
          touch out/target/product/TAQ90/system/etc/NOTICE.xml.gz
          touch out/target/product/TAQ90/obj/NOTICE.xml.gz
          touch out/target/product/TAQ90/obj/NOTICE.xml
          echo "✅ Dummy NOTICE files created"

      - name: Create telephony-ext Stub for Tablet Build (Fixed)
        run: |
          cd ~/android/lineage
          mkdir -p device/denver/TAQ90/telephony-ext
          
          # Create the Android.mk file
          cat > device/denver/TAQ90/telephony-ext/Android.mk << 'MK_EOF'
          LOCAL_PATH := $(call my-dir)
          include $(CLEAR_VARS)
          LOCAL_MODULE := telephony-ext
          LOCAL_SRC_FILES := stub.java
          LOCAL_MODULE_TAGS := optional
          LOCAL_MODULE_CLASS := JAVA_LIBRARIES
          include $(BUILD_JAVA_LIBRARY)
          MK_EOF
          
          # Create the stub.java file WITHOUT the 'public' keyword
          echo "package android.telephony; class TelephonyExtStub {}" > device/denver/TAQ90/telephony-ext/stub.java
          
          # Safely append to device.mk only once
          grep -q "PRODUCT_PACKAGES += telephony-ext" device/denver/TAQ90/device.mk || \
            echo "PRODUCT_PACKAGES += telephony-ext" >> device/denver/TAQ90/device.mk
            
          echo "✅ telephony-ext stub created and Java syntax fixed"

      - name: Fix Jack Server SSL Error (Ubuntu 22.04)
        run: |
          cd ~/android/lineage
          echo "=== 1. Re-enabling TLSv1 in Java 8 ==="
          # Removes TLSv1 and TLSv1.1 from the disabled algorithms list
          sudo sed -i 's/TLSv1, TLSv1.1, //g' /etc/java-8-openjdk/security/java.security || true
          
          echo "=== 2. Lowering OpenSSL 3.0 Security Level ==="
          # Ubuntu 22.04 uses OpenSSL 3.0 which blocks TLSv1 at the system level.
          # We lower the security level to 0 to allow it.
          sudo sed -i 's/DEFAULT@SECLEVEL=2/DEFAULT@SECLEVEL=0/g' /etc/ssl/openssl.cnf || true
          sudo sed -i 's/DEFAULT@SECLEVEL=1/DEFAULT@SECLEVEL=0/g' /etc/ssl/openssl.cnf || true
          
          echo "=== 3. Cleaning up old Jack server state ==="
          prebuilts/sdk/tools/jack-admin kill-server 2>/dev/null || true
          rm -rf ~/.jack-server ~/.jack 2>/dev/null || true
          echo "✅ Jack server SSL environment fixed"

      - name: Free Disk Space for Full ROM Build
        run: |
          cd ~/android/lineage
          # Safely clear heavy intermediates without breaking host toolchain cache
          rm -rf out/target/common/obj/JAVA_LIBRARIES \
               out/target/product/TAQ90/obj \
               out/host/linux-x86/obj/SHARED_LIBRARIES \
               out/host/linux-x86/obj/STATIC_LIBRARIES 2>/dev/null || true
          echo "✅ Freed disk space. Current usage:"
          df -h .

      - name: Build Full LineageOS ROM (Bacon)
        run: |
          cd ~/android/lineage
          export ALLOW_MISSING_DEPENDENCIES=true
          export CKATI_FLAGS=--use_find_emulator
          export JACK_SERVER_VM_ARGUMENTS="-Xmx4096m"
          export PYTHON=python2
          
          # CRITICAL: Enable ccache for this specific shell session
          export USE_CCACHE=1
          export CCACHE_EXEC=/usr/bin/ccache
          ccache -M 5G  # Give it 5GB of space
          ccache -z     # Reset statistics to 0 so we can see how many hits we get this run
          
          source build/envsetup.sh
          lunch lineage_TAQ90-userdebug
          
          # 'bacon' builds the system and packages it into a flashable ZIP
          make -j$(nproc) bacon
          
          # Show ccache statistics at the end to prove it's working!
          echo "=========================================="
          echo "=== CCACHE STATISTICS (Look for 'Cache hit') ==="
          echo "=========================================="
          ccache -s

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.run_number }}"
          name: "Lineage 15.1 TAQ90 - Build #${{ github.run_number }}"
          draft: false
          prerelease: false
          files: |
            ~/android/lineage/out/target/product/TAQ90/lineage-*.zip
            ~/android/lineage/out/target/product/TAQ90/recovery.img
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
