name: Lineage 15.1 TAQ90
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 720
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost /opt/hostedtoolcache/CodeQL \
            /usr/local/.ghcup /usr/share/swift
          sudo docker image prune -af || true
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git gnupg gperf \
            imagemagick lib32ncurses5-dev lib32readline-dev \
            lib32z1-dev liblz4-tool libncurses5-dev \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils \
            lzop pngcrush rsync schedtool squashfs-tools \
            xsltproc zip zlib1g-dev openjdk-8-jdk

      - name: Use Java 8
        run: |
          sudo update-alternatives --set java /usr/lib/jvm/java-8-openjdk-amd64/jre/bin/java
          sudo update-alternatives --set javac /usr/lib/jvm/java-8-openjdk-amd64/bin/javac
          echo "JAVA_HOME=/usr/lib/jvm/java-8-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-8-openjdk-amd64/bin" >> $GITHUB_PATH
          java -version
          javac -version

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-taq90-${{ github.run_id }}
          restore-keys: ccache-taq90-

      - name: Init repo
        run: |
          mkdir -p ~/android/lineage
          cd ~/android/lineage
          git config --global user.email "build@ci.local"
          git config --global user.name "CI Build"
          repo init -u https://github.com/LineageOS/android.git -b lineage-15.1 --depth=1

      - name: Sync source
        run: |
          cd ~/android/lineage
          repo sync -c --no-tags --no-clone-bundle --optimized-fetch \
            --prune --force-sync -j$(nproc)

      - name: Clone device tree
        run: |
          cd ~/android/lineage
          git clone --depth=1 https://github.com/Tommy0412/device_denver_TAQ90.git device_tmp
          rm -rf device/denver/TAQ90
          mkdir -p device/denver
          cp -r device_tmp/device/denver/TAQ90 device/denver/TAQ90
          rm -rf device_tmp

      - name: Clone vendor tree
        run: |
          cd ~/android/lineage
          git clone --depth=1 https://github.com/Tommy0412/vendor_denver_TAQ90.git vendor_tmp
          rm -rf vendor/denver/TAQ90
          mkdir -p vendor/denver
          cp -r vendor_tmp/vendor/denver/TAQ90 vendor/denver/TAQ90
          rm -rf vendor_tmp

      - name: Fix ckati Parser & Vendor Makefiles
        run: |
          cd ~/android/lineage
          
          # 1. Force Unix line endings on all .mk files
          find device/denver vendor/denver -type f -name "*.mk" -exec sed -i 's/\r$//' {} +
          
          # 2. Strip ALL leading tabs from top-level .mk files (ckati hates them in variable blocks)
          find device/denver vendor/denver -type f -name "*.mk" -exec sed -i 's/^[[:space:]]*\t//g' {} +
          
          # 3. Ensure every .mk file ends with a clean newline
          find device/denver vendor/denver -type f -name "*.mk" -exec sh -c '[ -n "$(tail -c 1 "{}")" ] && echo >> "{}"' \;
          
          # 4. Overwrite TAQ90-vendor.mk with a guaranteed-safe version
          #    This removes trailing spaces, fixes continuation, and handles empty dirs gracefully
          cat > vendor/denver/TAQ90/TAQ90-vendor.mk << 'VENDOR_EOF'
          # Auto-generated safe vendor file for recovery build
          PRODUCT_COPY_FILES += \
              $(call find-copy-subdir-files,*,vendor/denver/TAQ90/proprietary/vendor,vendor)
          VENDOR_EOF
          
          # 5. Ensure the source directory actually exists (prevents empty expansion)
          mkdir -p vendor/denver/TAQ90/proprietary/vendor
          
          # 6. Verify the fix
          echo "=== TAQ90-vendor.mk content (cat -A shows hidden chars) ==="
          cat -A vendor/denver/TAQ90/TAQ90-vendor.mk
          echo "=== Checking for leading tabs ==="
          grep -Pn '^\t' vendor/denver/TAQ90/*.mk device/denver/TAQ90/*.mk || echo "✅ Clean: No leading tabs found."

      - name: Debug Makefile Syntax Errors
        run: |
          cd ~/android/lineage
          echo "=== EXACT LINE 34 of build/core/Makefile ==="
          sed -n '34p' build/core/Makefile | cat -A | head -n 1
          echo "=== Lines 32-36 for context ==="
          sed -n '32,36p' build/core/Makefile | cat -A
          
          echo "=========================================="
          echo "2. Searching for hidden TABS in device/vendor trees"
          echo "=========================================="
          grep -rnP '^\t' --include="*.mk" device/denver/ vendor/denver/ || echo "No leading tabs found."
          
          echo "=========================================="
          echo "3. Checking the last included file (rcs-service)"
          echo "=========================================="
          cat -A vendor/qcom/opensource/rcs-service/Android.mk | head -n 15 || echo "File not found."
          
          echo "=========================================="
          echo "4. Checking for missing 'endif' in device tree"
          echo "=========================================="
          for f in device/denver/TAQ90/*.mk; do
            if [ -f "$f" ]; then
              if_count=$(grep -c -E 'ifeq|ifneq' "$f" || true)
              endif_count=$(grep -c 'endif' "$f" || true)
              echo "$f -> ifeq/ifneq: $if_count | endif: $endif_count"
            fi
          done

      - name: Build recovery
        run: |
          cd ~/android/lineage
          export JAVA_HOME=/usr/lib/jvm/java-8-openjdk-amd64
          export PATH="$JAVA_HOME/bin:$PATH"
          java -version
          export USE_CCACHE=1
          ccache -M 10G
          source build/envsetup.sh
          echo "--- AndroidProducts.mk ---"
          cat device/denver/TAQ90/AndroidProducts.mk
          lunch lineage_TAQ90-userdebug
          make -j$(nproc) recoveryimage

      - name: Upload recovery
        uses: actions/upload-artifact@v4
        with:
          name: recovery-TAQ90
          path: ~/android/lineage/out/target/product/TAQ90/recovery.img
