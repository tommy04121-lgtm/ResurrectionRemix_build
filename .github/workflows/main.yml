name: Lineage 15.1 TAQ90
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 720
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost /opt/hostedtoolcache/CodeQL \
            /usr/local/.ghcup /usr/share/swift
          sudo docker image prune -af || true
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git gnupg gperf \
            imagemagick lib32ncurses5-dev lib32readline-dev \
            lib32z1-dev liblz4-tool libncurses5-dev \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils \
            lzop pngcrush rsync schedtool squashfs-tools \
            xsltproc zip zlib1g-dev openjdk-8-jdk

      - name: Use Java 8
        run: |
          sudo update-alternatives --set java /usr/lib/jvm/java-8-openjdk-amd64/jre/bin/java
          sudo update-alternatives --set javac /usr/lib/jvm/java-8-openjdk-amd64/bin/javac
          echo "JAVA_HOME=/usr/lib/jvm/java-8-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-8-openjdk-amd64/bin" >> $GITHUB_PATH
          java -version
          javac -version

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-taq90-${{ github.run_id }}
          restore-keys: ccache-taq90-

      - name: Init repo
        run: |
          mkdir -p ~/android/lineage
          cd ~/android/lineage
          git config --global user.email "build@ci.local"
          git config --global user.name "CI Build"
          repo init -u https://github.com/LineageOS/android.git -b lineage-15.1 --depth=1

      - name: Sync source
        run: |
          cd ~/android/lineage
          repo sync -c --no-tags --no-clone-bundle --optimized-fetch \
            --prune --force-sync -j$(nproc)

      - name: Clone device tree
        run: |
          cd ~/android/lineage
          git clone --depth=1 https://github.com/Tommy0412/device_denver_TAQ90.git device_tmp
          rm -rf device/denver/TAQ90
          mkdir -p device/denver
          cp -r device_tmp/device/denver/TAQ90 device/denver/TAQ90
          rm -rf device_tmp

      - name: Clone vendor tree
        run: |
          cd ~/android/lineage
          git clone --depth=1 https://github.com/Tommy0412/vendor_denver_TAQ90.git vendor_tmp
          rm -rf vendor/denver/TAQ90
          mkdir -p vendor/denver
          cp -r vendor_tmp/vendor/denver/TAQ90 vendor/denver/TAQ90
          rm -rf vendor_tmp

      - name: Normalize device and vendor line endings
        run: |
          cd ~/android/lineage
          find device/denver/TAQ90 vendor/denver/TAQ90 -type f \
            \( -name '*.mk' -o -name '*.sh' -o -name '*.rc' -o \
               -name '*.fstab' -o -name '*.txt' -o -name '*.prop' -o \
               -name '*.xml' -o -name 'AndroidProducts.mk' \) \
            -print0 | xargs -0 sed -i 's/\r$//'
          find vendor/denver/TAQ90 -name '*#*' -type f -delete
          if [ ! -f device/denver/TAQ90/lineage.mk ]; then
            printf '%s\n' '$(call inherit-product, device/denver/TAQ90/lineage_TAQ90.mk)' \
              > device/denver/TAQ90/lineage.mk
          fi
          grep -q '^TARGET_USES_MKE2FS *:= *true' device/denver/TAQ90/BoardConfig.mk || \
            printf '\nTARGET_USES_MKE2FS := true\n' >> device/denver/TAQ90/BoardConfig.mk
          echo "--- lineage.mk ---"
          cat device/denver/TAQ90/lineage.mk

      - name: Build recovery
        run: |
          cd ~/android/lineage
          export JAVA_HOME=/usr/lib/jvm/java-8-openjdk-amd64
          export PATH="$JAVA_HOME/bin:$PATH"
          java -version
          export USE_CCACHE=1
          ccache -M 10G
          source build/envsetup.sh
          echo "--- AndroidProducts.mk ---"
          cat device/denver/TAQ90/AndroidProducts.mk
          lunch lineage_TAQ90-userdebug
          make -j$(nproc) recoveryimage

      - name: Upload recovery
        uses: actions/upload-artifact@v4
        with:
          name: recovery-TAQ90
          path: ~/android/lineage/out/target/product/TAQ90/recovery.img
